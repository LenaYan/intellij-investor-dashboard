name: Scheduled Dependency Audit

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 08:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (report only, no issue created)'
        required: false
        type: boolean
        default: false

concurrency:
  group: dep-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit dependencies
        id: audit
        run: |
          python3 << 'SCRIPT'
          import json
          import re
          import urllib.request
          import urllib.error

          # Parse implementation dependencies from build.gradle.kts
          deps = []
          with open('build.gradle.kts', 'r') as f:
              content = f.read()
              # Match implementation("group:artifact:version")
              for m in re.finditer(r'implementation\("([^"]+):([^"]+):([^"]+)"\)', content):
                  deps.append((m.group(1), m.group(2), m.group(3)))

          # Parse plugin versions
          plugins = []
          for m in re.finditer(r'id\("([^"]+)"\)\s+version\s+"([^"]+)"', content):
              # Convert plugin ID to Maven coordinate (approximate)
              plugins.append((m.group(1), m.group(2)))

          report_lines = []
          report_lines.append("| Dependency | Current | Latest | Status |")
          report_lines.append("|-----------|---------|--------|--------|")

          needs_action = False

          for group, artifact, version in deps:
              try:
                  url = f"https://search.maven.org/solrsearch/select?q=g:%22{group}%22+AND+a:%22{artifact}%22&rows=1&wt=json"
                  req = urllib.request.Request(url, headers={"User-Agent": "stocker-dep-audit/1.0"})
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      data = json.loads(resp.read())
                      docs = data.get("response", {}).get("docs", [])
                      if docs:
                          latest = docs[0].get("latestVersion", "unknown")
                          if latest != version:
                              # Check if major version bump
                              curr_major = version.split(".")[0]
                              lat_major = latest.split(".")[0]
                              if curr_major != lat_major:
                                  status = "⚠️ Major update"
                              else:
                                  status = "✅ Update available"
                              needs_action = True
                          else:
                              status = "✅ Up to date"
                      else:
                          latest = "not found"
                          status = "❓ Not in registry"
              except Exception as e:
                  latest = "error"
                  status = f"❌ Query failed"

              report_lines.append(f"| {group}:{artifact} | {version} | {latest} | {status} |")

          report = "\n".join(report_lines)

          with open("audit_report.md", "w") as f:
              f.write(f"## 📦 Dependency Audit Report — Stocker\n\n")
              f.write(f"Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)\n\n")
              f.write(report)
              if needs_action:
                  f.write("\n\n### ⚡ Action Required\nOne or more dependencies have updates available.")
              else:
                  f.write("\n\n### ✅ All dependencies are up to date.")

          # Output for GitHub Actions
          print(f"needs_action={'true' if needs_action else 'false'}")
          with open("$GITHUB_OUTPUT" if "$GITHUB_OUTPUT" else "/dev/null", "a") as gh:
              gh.write(f"needs_action={'true' if needs_action else 'false'}\n")
          SCRIPT

          # Fallback output setting
          if grep -q "needs_action=true" audit_report.md 2>/dev/null; then
            echo "needs_action=true" >> $GITHUB_OUTPUT
          else
            echo "needs_action=false" >> $GITHUB_OUTPUT
          fi

      - name: Display report
        run: cat audit_report.md

      - name: Close previous audit issues
        if: steps.audit.outputs.needs_action == 'true' && inputs.dry_run != true
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dep-audit',
              state: 'open'
            });
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });
            }

      - name: Create audit issue
        if: steps.audit.outputs.needs_action == 'true' && inputs.dry_run != true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('audit_report.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📦 Dependency Audit — Updates Available',
              body: report,
              labels: ['dep-audit']
            });
